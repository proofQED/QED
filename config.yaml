# =============================================================================
# QED Pipeline Configuration
# =============================================================================




# =============================================================================
# MODEL PROVIDERS
# =============================================================================

# --- Claude (Anthropic) ---
claude:
  cli_path: "claude"
  permission_mode: "bypassPermissions"

  # Choose ONE provider: "subscription", "bedrock", or "api_key"
  provider: "api_key"

  # --- Option 1: Claude subscription (Pro/Max) ---
  # No API key needed. Model is a shorthand: "opus", "sonnet", "haiku"
  # Claude Max required for "opus". Claude Pro supports "sonnet".
  subscription:
    model: "opus"

  # --- Option 2: AWS Bedrock ---
  bedrock:
    model: "us.anthropic.claude-opus-4-6-v1[1m]"
    aws_profile: "default"

  # --- Option 3: Anthropic API key ---
  api_key:
    model: "claude-opus-4-6"
    key: ""  # paste your Anthropic API key here

# --- Codex (OpenAI) ---
codex:
  cli_path: "codex"
  model: "gpt-5.5"
  reasoning_effort: "xhigh"

# --- Gemini (Google) ---
gemini:
  cli_path: "gemini"
  model: "gemini-3.1-pro-preview"  # or "gemini-3-flash-preview"
  approval_mode: "yolo"
  thinking_level: "HIGH"  # Gemini 3 thinking strength; for Gemini 2.5 use thinking_budget instead
  api_key: ""  # paste your Google Gemini API key here, leave empty if Gemini CLI is already logged in with subscription




# =============================================================================
# PROVER MODE SELECTION
# =============================================================================

prover:
  mode: "decomposition"  # only "decomposition" is supported




# =============================================================================
# PIPELINE SETTINGS
# =============================================================================

pipeline:
  # Each agent below is a dict with at least a `provider` key (claude, codex,
  # or gemini). Optional fields override the global provider section for this
  # agent only:
  #   model: "..."             # overrides {provider}.model
  #   reasoning_effort: "..."  # (codex only)
  #   thinking_level: "..."    # (gemini only)
  #   thinking_budget: N       # (gemini only)
  # Knobs not set here fall back to the global codex:/gemini:/claude: section.

  # Literature survey agent (Stage 0).
  # Evaluates problem difficulty and surveys related work before proof search.
  literature_survey:
    provider: "codex"
    

  # Proof effort summary agent (Stage 2).
  # Generates a summary of the entire proof journey after completion.
  proof_summary:
    provider: "codex"




# =============================================================================
# DECOMPOSITION MODE SETTINGS
# =============================================================================

decomposition:
  # Retry limits
  max_proof_attempts: 4    # REVISE_PROOF limit: proof attempts per revision
  max_revisions: 4         # REVISE_PLAN limit: total revisions per attempt (including original)
  max_decompositions: 4    # REWRITE limit: total decomposition attempts

  # Per-agent model selection. Each entry is a dict like:
  #   decomposer:
  #     provider: "codex"
  #     model: "gpt-5.5"           # optional — overrides global codex.model
  #     reasoning_effort: "xhigh"  # optional — overrides global codex.reasoning_effort
  # Unset knobs fall back to the global codex:/gemini:/claude: section.
  models:
    decomposer:
      provider: "codex"           # creates/revises proof decomposition plan
      model: "gpt-5.5-pro"
      reasoning_effort: "xhigh"
    single_prover:
      provider: "codex"           # executes decomposition plan, writes complete proof
      model: "gpt-5.5"
      reasoning_effort: "xhigh"
    regulator:
      provider: "codex"           # decides REVISE_PROOF/REVISE_PLAN/REWRITE after verification fails
    structural_verifier:
      provider: "codex"           # structural verification of proof (Phases 1-5)
    detailed_verifier:
      provider: "codex"           # detailed verification of proof (Phase 6)
    verdict:
      provider: "codex"           # final verdict on verification reports (DONE/CONTINUE)


# =============================================================================
# STANDALONE VERIFIER (used by verify/verify.py)
# =============================================================================

standalone_verifier:
  # Same dict-with-provider format as the agents above. CLI flags
  # --provider and --model on verify.py override these per-agent settings.
  judge:
    provider: "codex"
  structural_verifier:
    provider: "codex"
  detailed_verifier:
    provider: "codex"
  problem_reviewer:
    provider: "codex"             # used in --problem-only mode
