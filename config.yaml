# --- Prover Mode Selection ---
# Choose between "simple" (original iterative prover) or "decomposition" (step-by-step decomposition)
prover:
  mode: "simple"  # "simple" (default) or "decomposition"

# --- Decomposition Prover Settings ---
# Only used when prover.mode = "decomposition"
decomposition:
  max_prover_rounds: 2     # rounds per step before asking regulator
  max_revisions: 2         # local revisions per decomposition step
  max_decompositions: 2     # complete decomposition rewrites allowed

  # Model selection for each agent (claude, codex, or gemini)
  models:
    decomposer: "codex"       # creates/revises proof decomposition
    step_prover: "codex"      # proves individual steps
    step_verifier: "gemini"    # verifies step proofs
    regulator: "codex"        # decides revise/rewrite/continue
    proof_aggregator: "codex" # combines steps into final proof

pipeline:
  max_proof_iterations: 9

  # Multi-model parallel proof search.
  # When enabled: listed providers run in parallel each round, with a selector
  #   agent picking the best proof. Model selection is based solely on this config.
  # When disabled: all problems use Claude only. No selector needed.
  # Cost scales with number of providers: 2 providers = 2x proof search cost, 3 = 3x.
  multi_model:
    enabled: true               # true = use providers below, false = Claude-only
    providers: ["claude"]        # any subset of ["claude", "codex", "gemini"]

  # Multi-model verification.
  # When enabled, each proof is independently verified by all listed providers.
  # If ANY verifier's report says FAIL, the verdict is CONTINUE.
  # Model selection is based solely on this config, independent of multi_model above.
  # Cost scales linearly: 2 verifiers = 2x verification cost, 3 = 3x.
  verification_agents:
    enabled: true               # true = use providers below, false = Claude-only
    providers: ["claude"]       # any subset of ["claude", "codex", "gemini"]

  # Proof selection agent (only used when multi_model.enabled=true).
  # Picks the best proof when multiple models generate proofs in parallel.
  proof_select:
    provider: "claude"           # Model for selection (claude/codex/gemini)

  # Brainstorm session: multiple models independently brainstorm proof strategies
  # before proof search each round. Results are shared with the proof search agent.
  # Skipped for easy problems. Cost scales with number of providers.
  brainstorm:
    enabled: false              # true = run brainstorm before proof search
    providers: ["claude"]       # any subset of ["claude", "codex", "gemini"]

  # Literature survey agent (Stage 0).
  # Evaluates problem difficulty and surveys related work before proof search.
  literature_survey:
    provider: "codex"           # Model for survey (claude/codex/gemini)

  # Proof effort summary agent (Stage 2).
  # Generates a summary of the entire proof journey after completion.
  proof_summary:
    provider: "codex"           # Model for summary (claude/codex/gemini)

claude:
  cli_path: "claude"
  permission_mode: "bypassPermissions"

  # Choose ONE provider: "subscription", "bedrock", or "api_key"
  provider: "subscription"

  # --- Option 1: Claude subscription (Pro/Max) ---
  # No API key needed. Model is a shorthand: "opus", "sonnet", "haiku"
  # Claude Max required for "opus". Claude Pro supports "sonnet".
  subscription:
    model: "opus"

  # --- Option 2: AWS Bedrock ---
  bedrock:
    model: "us.anthropic.claude-opus-4-6-v1[1m]"
    aws_profile: "default"

  # --- Option 3: Anthropic API key ---
  api_key:
    model: "claude-opus-4-6"
    key: ""  # paste your Anthropic API key here

# --- Codex (OpenAI) ---
# Used for proof search (multi_model.providers) and/or verification (verification_agents.providers).
codex:
  cli_path: "codex"
  model: "gpt-5.4"
  reasoning_effort: "xhigh"

# --- Gemini (Google) ---
# Used for proof search (multi_model.providers) and/or verification (verification_agents.providers).
gemini:
  cli_path: "gemini"
  model: "gemini-3.1-pro-preview"  # or "gemini-3-flash-preview"
  approval_mode: "yolo"
  thinking_level: "HIGH"  # Gemini 3 thinking strength; for Gemini 2.5 use thinking_budget instead
  api_key: ""  # paste your Google Gemini API key here, leave empty if Gemini CLI is already logged in with subscription     
