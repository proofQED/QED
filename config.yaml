pipeline:
  max_proof_iterations: 9


  # Decomposition is a step where a separate agent breaks the proof into fine-grained
  # numbered "miniclaims" with dependency graphs and a hierarchical Proof Architecture,
  # before handing that structure to the verification agent. This gives the verifier a
  # pre-built checklist to verify claim-by-claim.
  #
  # When skip_decomposition is true, the decomposition step is removed. Instead the
  # verification agent reads the proof directly, identifies logical steps on its own,
  # and verifies each one inline. This saves one full agent call per round (or per model
  # in parallel mode) at the cost of the verifier doing double duty.
  # Easy problems are unaffected — they never use decomposition regardless of this setting.
  skip_decomposition: true

  # Multi-model parallel proof search.
  # When enabled: listed providers run in parallel each round, with a selector
  #   agent picking the best proof. Model selection is based solely on this config.
  # When disabled: all problems use Claude only. No selector needed.
  # Cost scales with number of providers: 2 providers = 2x proof search cost, 3 = 3x.
  multi_model:
    enabled: true               # true = use providers below, false = Claude-only
    providers: ["codex"]  # any subset of ["claude", "codex", "gemini"]

  # Multi-model verification.
  # When enabled, each proof is independently verified by all listed providers.
  # If ANY verifier's report says FAIL, the verdict is CONTINUE.
  # Model selection is based solely on this config, independent of multi_model above.
  # Cost scales linearly: 2 verifiers = 2x verification cost, 3 = 3x.
  verification_agents:
    enabled: true               # true = use providers below, false = Claude-only
    providers: ["gemini"]  # any subset of ["claude", "codex", "gemini"]

claude:
  cli_path: "claude"
  permission_mode: "bypassPermissions"

  # Choose ONE provider: "subscription", "bedrock", or "api_key"
  provider: "subscription"

  # --- Option 1: Claude subscription (Pro/Max) ---
  # No API key needed. Model is a shorthand: "opus", "sonnet", "haiku"
  # Claude Max required for "opus". Claude Pro supports "sonnet".
  subscription:
    model: "opus"

  # --- Option 2: AWS Bedrock ---
  bedrock:
    model: "us.anthropic.claude-opus-4-6-v1[1m]"
    aws_profile: "default"

  # --- Option 3: Anthropic API key ---
  api_key:
    model: "claude-opus-4-6"
    key: ""  # paste your Anthropic API key here

# --- Codex (OpenAI) ---
# Used for proof search (multi_model.providers) and/or verification (verification_agents.providers).
codex:
  cli_path: "codex"
  model: "gpt-5.4"
  reasoning_effort: "xhigh"

# --- Gemini (Google) ---
# Used for proof search (multi_model.providers) and/or verification (verification_agents.providers).
gemini:
  cli_path: "gemini"
  model: "gemini-3.1-pro-preview"  # or "gemini-3-flash-preview"
  approval_mode: "yolo"
  thinking_level: "HIGH"  # Gemini 3 thinking strength; for Gemini 2.5 use thinking_budget instead
  api_key: ""  # paste your Google Gemini API key here
